name: Build Artifacts

on:
  push:
    paths:
      - data/**
      - .github/workflows/build.yml
    branches:
      - main
  workflow_dispatch:

jobs:
  build-artifacts:
    strategy:
      matrix:
        build:
          - distro: fedora
            version: 44
            arch: x86_64
            runner: ubuntu-latest
            type: standard-virt
          - distro: fedora
            version: 44
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: standard-virt
          - distro: fedora
            version: 44
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: legacy-rpi02w
          - distro: fedora
            version: 44
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: legacy-rpi3
          - distro: fedora
            version: 44
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: standard-rpi4
          - distro: fedora
            version: 45
            arch: x86_64
            runner: ubuntu-latest
            type: standard-virt
          - distro: fedora
            version: 45
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: standard-virt
          - distro: fedora
            version: 45
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: legacy-rpi02w
          - distro: fedora
            version: 45
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: legacy-rpi3
          - distro: fedora
            version: 45
            arch: aarch64
            runner: ubuntu-24.04-arm
            type: standard-rpi4
    runs-on: ${{ matrix.build.runner }}
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6
      - name: "Setup"
        env:
          LATEST: /artifacts/${{ github.ref_name }}/latest/${{ matrix.build.version }}/${{ matrix.build.arch }}/
        run: |
          DATED=/artifacts/${{ github.ref_name }}/$(date +%Y.%m.%d)/${{ matrix.build.version }}/${{ matrix.build.arch }}/
          sudo mkdir -p $LATEST $DATED
          echo "DATED=$DATED" >> $GITHUB_ENV
      - name: "Build"
        env:
          LATEST: /artifacts/${{ github.ref_name }}/latest/${{ matrix.build.version }}/${{ matrix.build.arch }}/
        run: |
          sudo podman run --rm --privileged \
          -v $LATEST:/output:Z \
          -v ./data:/data:Z \
          -e IMAGE_BUILDER_EXPERIMENTAL=yamldir=/data/defs \
          ghcr.io/osbuild/image-builder-cli:latest \
            --progress=verbose \
            --force-repo-dir=/data/repo \
            build \
            --output-dir /output \
            --distro teamsbc-${{ matrix.build.version }} \
            --with-manifest \
            ${{ matrix.build.type }}
          ls -larth $LATEST
      - name: "Copy to dated directory"
        env:
          LATEST: /artifacts/${{ github.ref_name }}/latest/${{ matrix.build.version }}/${{ matrix.build.arch }}/
        run: |
          sudo cp -a $LATEST/* $DATED/
      - name: "Upload"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp --recursive /artifacts \
            "s3://teamsbc-artifacts/" \
            --no-progress
