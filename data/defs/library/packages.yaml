---
core: &core
  include:
    - "@core"
    - "systemd-pam"
    - "systemd-networkd"
    - "systemd-networkd-defaults"
    - "dbus"
    - "fwupd-efi"
    - "libxkbcommon"
    - "linux-firmware"
  exclude:
    - "NetworkManager"
    - "sssd*"
    - "dracut-config-rescue"
    - "firewalld"
    - "plymouth"
    - "kmscon"
    - "sudo"
    # We don't want /boot/efi to exist as we don't use it
    - "efi-filesystem"

standard: &standard
  include:
    - "teamsbc-release-standard"
    - "teamsbc-config-standard"

rpi: &rpi
  include:
    - "bcm283x-firmware"
    - "brcmfmac-firmware"
    # we'd really like this to be only in the build pipeline as it
    # bloats the size of the image quite a bit; needs some upstream
    # work to achieve that
    - "uboot-images-armv8"
