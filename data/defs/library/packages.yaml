---
core: &core
  include:
    - "@core"
    - "systemd-pam"
    - "systemd-networkd"
    - "systemd-networkd-defaults"
    - "dbus"
    - "fwupd-efi"
    - "libxkbcommon"
    - "linux-firmware"
    # We don't want /boot/efi to exist as we don't use it but we can't
    # exclude the package as `bcm283x-firmware` depends on it.
    - "efi-filesystem"
  exclude:
    - "NetworkManager"
    - "sssd*"
    - "dracut-config-rescue"
    - "firewalld"
    - "plymouth"
    - "kmscon"
    - "sudo"

standard: &standard
  include:
    - "teamsbc-release-standard"
    - "teamsbc-config-standard"
