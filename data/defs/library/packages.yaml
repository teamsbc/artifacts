---
core: &core
  include:
    - "@core"
    - "systemd-pam"
    - "systemd-networkd"
    - "systemd-networkd-defaults"
    - "dbus"
    - "fwupd-efi"
    - "libxkbcommon"
    - "linux-firmware"
    - "teamsbc-selinux"
  exclude:
    - "NetworkManager"
    - "sssd*"
    - "dracut-config-rescue"
    - "firewalld"
    - "plymouth"
    - "kmscon"
    - "sudo"

standard: &standard
  include:
    - "teamsbc-release-standard"
    - "teamsbc-config-standard"
