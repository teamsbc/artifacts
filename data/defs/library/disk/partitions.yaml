---
esp: &esp
  size: "200 MiB"
  type: !xref "library/dps.yaml#esp"
  payload_type: "filesystem"
  payload:
    type: vfat
    mountpoint: "/boot/efi"
    label: "ESP"
    fstab_options: "defaults,uid=0,gid=0,umask=077,shortname=winnt"
    fstab_freq: 0
    fstab_passno: 2

root: &root
  size: "6 GiB"
  payload_type: "filesystem"
  payload:
    type: "ext4"
    label: "root"
    mountpoint: "/"
    fstab_options: "defaults"
    fstab_freq: 0
    fstab_passno: 0
