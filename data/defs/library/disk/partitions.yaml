---
esp: &esp
  size: "1 GiB"
  type: !xref "library/dps.yaml#esp"
  payload_type: "filesystem"
  payload:
    type: vfat
    mountpoint: "/boot"
    label: "ESP"
    fstab_options: "defaults,uid=0,gid=0,umask=077,shortname=winnt"
    fstab_freq: 0
    fstab_passno: 2

root: &root
  size: "6 GiB"
  attrs:
    - 59  # grow filesystem gpt flag, setting this allows tooling that
          # understands this flag (systemd) to automatically grow the filesystem
          # when the partition is mounted
  payload_type: "filesystem"
  payload:
    type: "ext4"
    label: "root"
    mountpoint: "/"
    fstab_options: "defaults"
    fstab_freq: 0
    fstab_passno: 0
