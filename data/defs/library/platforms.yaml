---
x86_64_uefi: &x86_64_uefi
  arch: "x86_64"
  uefi_vendor: "fedora"
  image_format: "raw"
  qcow2_compat: "1.1"
  packages:
    uefi:
      - "dracut-config-generic"
      - "systemd-boot"
  bootloader: "systemd"

aarch64_uefi: &aarch64_uefi
  arch: "aarch64"
  uefi_vendor: "fedora"
  image_format: "raw"
  qcow2_compat: "1.1"
  packages:
    uefi:
      - "dracut-config-generic"
      - "systemd-boot"
  bootloader: "systemd"
