---
.common:
  packages:
    - &packages_core
      include:
        - "@core"
        - "systemd-pam"
        - "systemd-networkd"
        - "systemd-networkd-defaults"
        - "dbus"
        - "grubby"
        - "fwupd-efi"
        - "libxkbcommon"
        - "linux-firmware"
      exclude:
        - "NetworkManager"
        - "sssd*"
        - "dracut-config-rescue"
        - "firewalld"
        - "plymouth"
        - "kmscon"
        - "sudo"
    - &packages_standard
      include:
        - "teamsbc-release-standard"
    - &packages_rpi
      include:
        - "bcm283x-firmware"
        - "brcmfmac-firmware"
        # we'd really like this to be only in the build pipeline as it
        # bloats the size of the image quite a bit; needs some upstream
        # work to achieve that
        - "uboot-images-armv8"

  platforms:
    x86_64_uefi_platform: &x86_64_uefi_platform
      arch: "x86_64"
      uefi_vendor: "fedora"
      image_format: "raw"
      qcow2_compat: "1.1"
      packages:
        uefi:
          - "dracut-config-generic"
          - "efibootmgr"
          - "grub2-efi-x64"
          - "shim-x64"
      bootloader: "grub2"
    aarch64_uefi_platform: &aarch64_uefi_platform
      arch: "aarch64"
      uefi_vendor: "fedora"
      image_format: "raw"
      qcow2_compat: "1.1"
      packages:
        uefi:
          - "dracut-config-generic"
          - "efibootmgr"
          - "grub2-efi-aa64"
          - "grub2-tools"
          - "shim-aa64"
      bootloader: "grub2"

  disk_sizes:
    default_required_partition_sizes: &default_required_dir_sizes
      "/": "2 GiB"

    # default individual partitions for easier composability in the partition
    # tables below
    partition_defaults:
      - &default_efi_partition
        size: "200 MiB"
        type: !xref "library/dps.yaml#esp"
        payload_type: "filesystem"
        payload:
          type: vfat
          mountpoint: "/boot/efi"
          label: "ESP"
          fstab_options: "defaults,uid=0,gid=0,umask=077,shortname=winnt"
          fstab_freq: 0
          fstab_passno: 2
      - &default_root_partition
        size: "6 GiB"
        payload_type: "filesystem"
        payload: &default_partition_table_part_root_payload
          type: "ext4"
          label: "root"
          mountpoint: "/"
          fstab_options: "defaults"
          fstab_freq: 0
          fstab_passno: 0

    virt_partition_tables: &virt_partition_tables
      x86_64:
        type: "gpt"
        partitions:
          - *default_efi_partition
          - <<: *default_root_partition
            size: "2 GiB"
            type: !xref "library/dps.yaml#root_x86_64"
      aarch64: &default_partition_table_aarch64
        type: "gpt"
        partitions:
          - *default_efi_partition
          - <<: *default_root_partition
            type: !xref "library/dps.yaml#root_aarch64"

    rpi4_partition_tables: &rpi4_partition_tables
      aarch64: *default_partition_table_aarch64

  disk_defaults: &disk_defaults
    filename: "disk.raw.xz"
    compression: "xz"
    mime_type: "application/xz"
    bootable: true
    default_size: "1 GiB"
    image_func: "disk"
    exports: ["xz"]
    required_partition_sizes: *default_required_dir_sizes

  disk_defaults_standard: &disk_defaults_standard
    <<: *disk_defaults
    disk_config:
      mount_configuration: "none"

image_types:
  "standard-virt":
    <<: *disk_defaults_standard
    partition_table: *virt_partition_tables
    package_sets:
      os:
        - *packages_core
        - *packages_standard
    platforms:
      - *x86_64_uefi_platform
      - *aarch64_uefi_platform

  "standard-rpi4":
    <<: *disk_defaults_standard
    partition_table: *rpi4_partition_tables
    package_sets:
      os:
        - *packages_core
        - *packages_standard
        - *packages_rpi
    platforms:
      - <<: *aarch64_uefi_platform
        boot_files:
          - ["/usr/share/uboot/rpi_arm64/u-boot.bin", "/boot/efi/rpi-u-boot.bin"]
