---
.common:
  disk_sizes:
    default_required_partition_sizes: &default_required_dir_sizes
      "/": "2 GiB"

  disk_defaults: &disk_defaults
    filename: "disk.raw.xz"
    compression: "xz"
    mime_type: "application/xz"
    bootable: true
    default_size: "1 GiB"
    image_func: "disk"
    exports: ["xz"]
    required_partition_sizes: *default_required_dir_sizes

  disk_defaults_standard: &disk_defaults_standard
    <<: *disk_defaults
    disk_config:
      mount_configuration: "none"

image_types:
  "standard-virt":
    <<: *disk_defaults_standard
    partition_table: !xref "library/disk/tables.yaml#virt"
    package_sets:
      os:
        - !xref "library/packages.yaml#core"
        - !xref "library/packages.yaml#standard"
    platforms:
      - !xref "library/platforms.yaml#x86_64_uefi"
      - !xref "library/platforms.yaml#aarch64_uefi"

  "standard-rpi4":
    <<: *disk_defaults_standard
    partition_table: !xref "library/disk/tables.yaml#rpi4"
    package_sets:
      os:
        - !xref "library/packages.yaml#core"
        - !xref "library/packages.yaml#standard"
        - !xref "library/packages.yaml#rpi"
    platforms:
      - <<: !xref "library/platforms.yaml#aarch64_uefi"
        boot_files:
          - ["/usr/share/uboot/rpi_arm64/u-boot.bin", "/boot/efi/rpi-u-boot.bin"]
